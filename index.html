<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encarte PRO - Platinum Fix Final</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Fredoka+One&family=Luckiest+Guy&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Passion+One:wght@400;700;900&family=Poppins:wght@400;700;900&family=Righteous&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        :root {
            --cor-fundo-prod: rgba(255, 255, 255, 1);
            --cor-borda-prod: rgba(255, 204, 0, 1);
            --cor-texto-nome: #333333;
            --cor-texto-legenda: #ffffff;
            --cor-texto-preco: #ffffff;
            --cor-fundo-box-preco: #d90000; 
            --fonte-nome: 'Montserrat', sans-serif;
            --fonte-preco: 'Anton', sans-serif;
            --sz-nome: 14px;
            --sz-preco: 28px;
            --dist-nome: 0px;
            --dist-preco: 0px;
            --tamanho-imagem-prod: 90%;
            --padding-topo-grid: 230px;
            --gap-produtos: 12px;
            --grid-cols: 1; --grid-rows: 1;
            --tamanho-selo: 80px; --selo-x: -10px; --selo-y: -10px; --selo-rot: -10deg;
            
            --encarte-width: 540px;
            --encarte-height: 960px;
        }

        body { font-family: 'Segoe UI', sans-serif; display: flex; gap: 20px; padding: 20px; background: #e9ecef; margin: 0; height: 100vh; overflow: hidden; }
        .painel { width: 380px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; flex-shrink: 0; height: 95vh; }
        h3 { margin: 15px 0 8px 0; color: #2c3e50; font-size: 11px; border-bottom: 2px solid #f0f0f0; padding-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 3px; font-weight: 700; font-size: 10px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        button { color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        .btn-add { background: #007bff; }
        .btn-exportar { background: #28a745; font-size: 16px; padding: 15px; margin-top: 10px; }
        .grid-dupla { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .prancheta-container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; overflow: auto; padding: 20px; background: #ced4da; }
        
        #encarte {
            width: var(--encarte-width); height: var(--encarte-height);
            background-color: #fff; 
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative; padding: var(--padding-topo-grid) 25px 50px 25px; box-sizing: border-box; 
            transition: width 0.3s, height 0.3s; 
        }

        #grid-produtos { 
            display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); grid-template-rows: repeat(var(--grid-rows), 1fr);
            gap: var(--gap-produtos); width: 100%; height: 100%; align-content: center;
        }

        .produto-item {
            background: var(--cor-fundo-prod); border: 2px solid var(--cor-borda-prod);
            border-radius: 10px; padding: 5px; text-align: center; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-sizing: border-box;
            height: 100%; overflow: hidden;
        }

        .produto-nome { 
            font-family: var(--fonte-nome); font-size: var(--sz-nome); font-weight: 900; 
            text-transform: uppercase; color: var(--cor-texto-nome); line-height: 1.1; width: 100%; 
            min-height: 24px; display: flex; align-items: center; justify-content: center; z-index: 2;
            transform: translateY(var(--dist-nome));
        }
        
        .produto-img-wrapper { 
            width: var(--tamanho-imagem-prod); flex-grow: 1; background-size: contain; 
            background-position: center; background-repeat: no-repeat; z-index: 1; 
            cursor: pointer; transition: opacity 0.2s;
        }
        .produto-img-wrapper:hover { opacity: 0.8; }
        
        .area-precos-flex { 
            display: flex; width: 100%; justify-content: center; align-items: flex-end;
            gap: 4px; z-index: 2; padding-bottom: 2px;
            transform: translateY(var(--dist-preco));
        }

        .bloco-preco { 
            display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: var(--cor-fundo-box-preco); border-radius: 6px; 
            padding: 2px 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.15); 
            min-width: 40%; max-width: 48%;
        }

        .label-variacao { font-size: 7px; font-weight: 900; text-transform: uppercase; color: var(--cor-texto-legenda); margin-bottom: -2px; }
        .label-variacao:empty { display: none; }
        
        .produto-preco { font-family: var(--fonte-preco); font-size: var(--sz-preco); color: var(--cor-texto-preco); display: inline-flex; align-items: baseline; line-height: 1.1; }
        .simbolo-moeda { font-size: 0.45em; margin-right: 1px; }

        .btn-excluir { position: absolute; top: 0px; right: 0px; background: red; color: white; border: none; border-radius: 50%; width: 10px; height: 10px; cursor: pointer; z-index: 20; font-size: 8px; }
        
        /* NOVO BOTÃO DE ADICIONAR SELO */
        .btn-add-selo { position: absolute; top: 0px; right: 35px; background: #ffc107; color: black; border: none; border-radius: 50%; width: 10px; height: 10px; cursor: pointer; z-index: 20; font-size: 8px; }

        .btn-duplicar { position: absolute; top: 0px; left: 0px; background: #664fff; color: white; border: none; border-radius: 50%; width: 10px; height: 10px; cursor: pointer; z-index: 20; font-size: 8px; }

        .produto-selo-img { position: absolute; top: var(--selo-y); left: var(--selo-x); width: var(--tamanho-selo); transform: rotate(var(--selo-rot)); z-index: 10; cursor: pointer; transition: opacity 0.2s; }
        .produto-selo-img:hover { opacity: 0.4; }
        
        .rodape-encarte { position: absolute; bottom: 12px; left: 0; width: 100%; text-align: center; color: white; font-size: 11px; font-weight: bold; cursor: text; outline: none; font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>

    <input type="file" id="input-trocar-img" accept="image/*" style="display: none;" onchange="efetivarTrocaImagem(this)">
    <input type="file" id="input-trocar-selo" accept="image/*" style="display: none;" onchange="efetivarTrocaSelo(this)">

    <div class="painel">
        <h3>Layout Encarte</h3>
        <div class="form-group">
            <label>Formato do Encarte:</label>
            <select id="adj-formato" onchange="mudarFormato()">
                <option value="story">Story (9:16)</option>
                <option value="feed">Feed Quadrado (1:1)</option>
                <option value="feed-retrato">Feed Retrato (4:5)</option>
            </select>
        </div>
       
        <br><div class="form-group"><label>Fundo do Encarte:</label><input type="file" id="in-bg-file" accept="image/*" onchange="trocarFundo(this)"></div>

        <br><h3>Dados do Produto</h3>
        <input type="text" id="in-nome" placeholder="Nome do Produto" style="width:96%; padding:7px; margin-bottom:5px;">
        <div class="grid-dupla">
            <input type="text" id="in-p1" placeholder="Preço 1">
            <input type="text" id="in-l1" placeholder="Leg. 1 (Ex: un)">
        </div>
        <div class="grid-dupla" style="margin-top:5px">
            <input type="text" id="in-p2" placeholder="Preço 2 (Opcional)">
            <input type="text" id="in-l2" placeholder="Leg. 2">
        </div>
        <br>
        <div class="form-group"><label><br>Imagem do Produto:</label><input type="file" id="in-img" accept="image/*"></div>
        
        <br><button class="btn-add" onclick="criarProduto()">+ Adicionar ao Encarte</button>

        <br><h3>Tipografia</h3>
        <div class="form-group">
            <h6>Fonte descrição</h6>
            <select id="f-nome-tipo" onchange="aplicarDesign()">
                <option value="'Montserrat'">Montserrat</option><option value="'Bebas Neue'">Bebas Neue</option><option value="'Fredoka One'">Fredoka One</option><option value="'Roboto'">Roboto</option>
            </select>
        </div>
        <div class="form-group">
            <h6>Fonte Preço R$</h6>
            <select id="f-preco-tipo" onchange="aplicarDesign()">
                <option value="'Montserrat'">Montserrat</option><option value="'Bebas Neue'">Bebas Neue</option><option value="'Fredoka One'">Fredoka One</option><option value="'Roboto'">Roboto</option>
            </select>
        </div>

        <h3>Cores e Transparência</h3>
        <div class="grid-dupla">
            <div class="form-group"><label>Descrição</label><input type="color" id="clr-nome" value="#333333" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Legenda:</label><input type="color" id="clr-leg" value="#ffffff" oninput="aplicarDesign()"></div>
        </div>
        <div class="grid-dupla">
            <div class="form-group"><label>Preço:</label><input type="color" id="clr-preco" value="#ffffff" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Box Preço:</label><input type="color" id="clr-box" value="#d90000" oninput="aplicarDesign()"></div>
        </div>
        <div class="grid-dupla">
            <div class="form-group"><label>Card Produto:</label><input type="color" id="clr-card" value="#ffffff" oninput="aplicarDesign()"><input type="range" id="op-card" min="0" max="1" step="0.1" value="1" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Borda do Card:</label><input type="color" id="clr-borda" value="#ffcc00" oninput="aplicarDesign()"><input type="range" id="op-borda" min="0" max="1" step="0.1" value="1" oninput="aplicarDesign()"></div>
        </div>

        <h3>Alinhamentos</h3>
        
        <div class="grid-dupla">
            <div class="form-group"><label>Tam Descrição:</label><input type="range" id="range-sz-nome" min="10" max="35" value="14" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Tam Preço:</label><input type="range" id="range-sz-preco" min="15" max="65" value="28" oninput="aplicarDesign()"></div>
        </div>
        <div class="grid-dupla">
            <div class="form-group"><label>Eixo Y Nome:</label><input type="range" id="range-dist-nome" min="-50" max="50" value="0" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Eixo Y Preço:</label><input type="range" id="range-dist-preco" min="-50" max="50" value="0" oninput="aplicarDesign()"></div>
        </div>
        <div class="form-group"><label>Tamanho da Imagem %:</label><input type="range" id="range-img-sz" min="40" max="100" value="90" oninput="aplicarDesign()"></div>

         <div class="grid-dupla">
            <div class="form-group"><label>Padding Top (Altura):</label><input type="range" id="range-padding-top" min="50" max="500" value="230" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Espaço Cards (Gap):</label><input type="range" id="range-gap" min="0" max="50" value="12" oninput="aplicarDesign()"></div>
        </div>

        <h3>Ajustes do Selo</h3>
        <div class="grid-dupla">
            <input type="range" id="s-size" min="30" max="250" value="80" oninput="aplicarDesign()">
            <input type="range" id="s-rot" min="-180" max="180" value="-10" oninput="aplicarDesign()">
        </div>
        <div class="grid-dupla">
            <input type="range" id="s-x" min="-100" max="200" value="-10" oninput="aplicarDesign()">
            <input type="range" id="s-y" min="-100" max="200" value="-10" oninput="aplicarDesign()">
        </div>

        <h3>1. Memória</h3>
        <select id="select-memoria" onchange="carregarDaMemoria()" style="width:100%; margin-bottom:5px;"><option value="">Puxar da Memória...</option></select>
        <button style="background:#6c757d; font-size:11px;" onclick="salvarNaMemoria()">💾 Salvar na Memória</button>


        <button class="btn-exportar" onclick="exportar()">🚀 BAIXAR IMG</button>
    </div>

    <div class="prancheta-container">
        <div id="encarte" class="bg-area">
            <div id="grid-produtos"></div>
            <div class="rodape-encarte" contenteditable="true" spellcheck="false">OFERTAS VÁLIDAS ATÉ 00/00/0000 OU ENQUANTO DURAREM OS ESTOQUES.</div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('encarte_v_bg_fix')) || [];
        let hist = [], imgT = null, seloT = null;
        let divImagemAlvo = null; 
        let cardSeloAlvo = null; // Variável para controlar em qual card o selo vai entrar

        window.onload = () => {
            renderMemoria();
            new Sortable(document.getElementById('grid-produtos'), { animation: 150, onStart: () => hist.push(document.getElementById('grid-produtos').innerHTML) });
            aplicarDesign();
            atualizarGradeAutomatica();
        };

        const ler = (f) => new Promise(res => { if(!f) return res(null); const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); });
        const hexRgb = (h) => { let b = parseInt(h.replace('#', ''), 16); return `${(b>>16)&255}, ${(b>>8)&255}, ${b&255}`; };

        async function trocarFundo(input) {
            const file = input.files[0];
            if (file) {
                const url = await ler(file);
                document.getElementById('encarte').style.backgroundImage = `url('${url}')`;
            }
        }

        function prepararTrocaImagem(elemento) {
            divImagemAlvo = elemento;
            document.getElementById('input-trocar-img').click();
        }

        async function efetivarTrocaImagem(input) {
            const file = input.files[0];
            if (file && divImagemAlvo) {
                hist.push(document.getElementById('grid-produtos').innerHTML); 
                const url = await ler(file);
                divImagemAlvo.style.backgroundImage = `url('${url}')`;
            }
            input.value = ''; 
            divImagemAlvo = null;
        }

        // --- FUNÇÕES PARA ADICIONAR/TROCAR O SELO DIRETAMENTE NO CARD ---
        function prepararTrocaSelo(btn) {
            cardSeloAlvo = btn.parentElement; // Pega o card inteiro
            document.getElementById('input-trocar-selo').click();
        }

        async function efetivarTrocaSelo(input) {
            const file = input.files[0];
            if (file && cardSeloAlvo) {
                hist.push(document.getElementById('grid-produtos').innerHTML); // Salva histórico
                const url = await ler(file);
                
                // Se já existir um selo, remove ele antes de adicionar o novo
                const seloExistente = cardSeloAlvo.querySelector('.produto-selo-img');
                if (seloExistente) {
                    seloExistente.remove();
                }

                // Cria o novo selo e adiciona no card
                const novoSelo = document.createElement('img');
                novoSelo.src = url;
                novoSelo.className = 'produto-selo-img';
                novoSelo.title = "Clique para remover o selo";
                novoSelo.onclick = function() { removerSelo(this); };
                
                cardSeloAlvo.appendChild(novoSelo);
            }
            input.value = ''; 
            cardSeloAlvo = null;
        }
        // ----------------------------------------------------------------

        function atualizarGradeAutomatica() {
            const grid = document.getElementById('grid-produtos');
            const qtd = grid.children.length;
            const s = document.documentElement.style;

            let cols = 1;
            let rows = 1;

            if (qtd === 0 || qtd === 1) { cols = 1; rows = 1; }
            else if (qtd === 2) { cols = 2; rows = 1; }
            else if (qtd === 3) { cols = 3; rows = 1; }
            else if (qtd === 4) { cols = 2; rows = 2; }
            else if (qtd <= 6) { cols = 3; rows = 2; }
            else if (qtd <= 8) { cols = 4; rows = 2; }
            else if (qtd === 9) { cols = 3; rows = 3; }
            else if (qtd <= 12) { cols = 4; rows = 3; }
            else { 
                cols = 4; 
                rows = Math.ceil(qtd / 4); 
            }

            s.setProperty('--grid-cols', cols);
            s.setProperty('--grid-rows', rows);
        }

        function duplicarProduto(btn) {
            hist.push(document.getElementById('grid-produtos').innerHTML);
            const clone = btn.parentElement.cloneNode(true);
            document.getElementById('grid-produtos').appendChild(clone);
            atualizarGradeAutomatica(); 
        }

        function removerProduto(btn) {
            hist.push(document.getElementById('grid-produtos').innerHTML); 
            btn.parentElement.remove();
            atualizarGradeAutomatica(); 
        }

        function removerSelo(img) {
            hist.push(document.getElementById('grid-produtos').innerHTML); 
            img.remove(); 
        }

        function mudarFormato() {
            const f = document.getElementById('adj-formato').value;
            const s = document.documentElement.style;
            const rangePadding = document.getElementById('range-padding-top');

            if (f === 'story') {
                s.setProperty('--encarte-width', '540px');
                s.setProperty('--encarte-height', '960px');
                rangePadding.value = 230; 
            } else if (f === 'feed') {
                s.setProperty('--encarte-width', '540px');
                s.setProperty('--encarte-height', '540px');
                rangePadding.value = 100; 
            } else if (f === 'feed-retrato') {
                s.setProperty('--encarte-width', '540px');
                s.setProperty('--encarte-height', '675px');
                rangePadding.value = 150; 
            }
            aplicarDesign(); 
        }

        function aplicarDesign() {
            const s = document.documentElement.style;
            s.setProperty('--cor-fundo-prod', `rgba(${hexRgb(document.getElementById('clr-card').value)}, ${document.getElementById('op-card').value})`);
            s.setProperty('--cor-borda-prod', `rgba(${hexRgb(document.getElementById('clr-borda').value)}, ${document.getElementById('op-borda').value})`);
            s.setProperty('--cor-texto-nome', document.getElementById('clr-nome').value);
            s.setProperty('--cor-texto-legenda', document.getElementById('clr-leg').value);
            s.setProperty('--cor-texto-preco', document.getElementById('clr-preco').value);
            s.setProperty('--cor-fundo-box-preco', document.getElementById('clr-box').value);
            s.setProperty('--fonte-nome', document.getElementById('f-nome-tipo').value);
            s.setProperty('--fonte-preco', document.getElementById('f-preco-tipo').value);
            s.setProperty('--sz-nome', document.getElementById('range-sz-nome').value + 'px');
            s.setProperty('--sz-preco', document.getElementById('range-sz-preco').value + 'px');
            s.setProperty('--dist-nome', document.getElementById('range-dist-nome').value + 'px');
            s.setProperty('--dist-preco', document.getElementById('range-dist-preco').value + 'px');
            s.setProperty('--padding-topo-grid', document.getElementById('range-padding-top').value + 'px');
            s.setProperty('--gap-produtos', document.getElementById('range-gap').value + 'px');
            s.setProperty('--tamanho-imagem-prod', document.getElementById('range-img-sz').value + '%');
            s.setProperty('--tamanho-selo', document.getElementById('s-size').value + 'px');
            s.setProperty('--selo-x', document.getElementById('s-x').value + 'px');
            s.setProperty('--selo-y', document.getElementById('s-y').value + 'px');
            s.setProperty('--selo-rot', document.getElementById('s-rot').value + 'deg');
        }

        async function criarProduto() {
            hist.push(document.getElementById('grid-produtos').innerHTML);
            const n = document.getElementById('in-nome').value;
            const p1 = document.getElementById('in-p1').value;
            const l1 = document.getElementById('in-l1').value.trim();
            const p2 = document.getElementById('in-p2').value;
            const l2 = document.getElementById('in-l2').value.trim(); 
            
            const uI = document.getElementById('in-img').files[0] ? await ler(document.getElementById('in-img').files[0]) : (imgT || 'https://via.placeholder.com/150');
            const uS = document.getElementById('in-selo').files[0] ? await ler(document.getElementById('in-selo').files[0]) : seloT;
            
            if(!n || !p1) return alert("Nome e Preço são obrigatórios!");

            const div = document.createElement('div'); div.className = 'produto-item';
            
            // INCLUÍDO O BOTÃO DA ETIQUETA AQUI
            div.innerHTML = `
                <button class="btn-duplicar" onclick="duplicarProduto(this)" title="Duplicar">✚</button>
                <button class="btn-excluir" onclick="removerProduto(this)" title="Excluir">✕</button>
                <button class="btn-add-selo" onclick="prepararTrocaSelo(this)" title="Adicionar ou Trocar Selo">🏷️</button>
                
                ${uS ? `<img src="${uS}" class="produto-selo-img" onclick="removerSelo(this)" title="Clique para remover o selo">` : ''}
                
                <div class="produto-nome" contenteditable="true">${n}</div>
                <div class="produto-img-wrapper" style="background-image: url('${uI}')" onclick="prepararTrocaImagem(this)" title="Clique para trocar a foto"></div>
                <div class="area-precos-flex">
                    <div class="bloco-preco">
                        ${l1 ? `<div class="label-variacao" contenteditable="true">${l1}</div>` : ''}
                        <div class="produto-preco" contenteditable="true"><span class="simbolo-moeda">R$</span>${p1}</div>
                    </div>
                    ${p2 ? `
                    <div class="bloco-preco">
                        ${l2 ? `<div class="label-variacao" contenteditable="true">${l2}</div>` : ''}
                        <div class="produto-preco" contenteditable="true"><span class="simbolo-moeda">R$</span>${p2}</div>
                    </div>` : ''}
                </div>`;
            document.getElementById('grid-produtos').appendChild(div);

            document.getElementById('in-nome').value = '';
            document.getElementById('in-p1').value = '';
            document.getElementById('in-p2').value = '';
            document.getElementById('in-l1').value = '';
            document.getElementById('in-l2').value = '';
            document.getElementById('in-img').value = '';
            imgT = null;
            
            atualizarGradeAutomatica(); 
        }

        async function salvarNaMemoria() {
            const n = document.getElementById('in-nome').value; if(!n) return alert("Dê um nome!");
            const i = document.getElementById('in-img').files[0] ? await ler(document.getElementById('in-img').files[0]) : imgT;
            const s = document.getElementById('in-selo').files[0] ? await ler(document.getElementById('in-selo').files[0]) : seloT;
            db.push({ n, p1: document.getElementById('in-p1').value, l1: document.getElementById('in-l1').value, i, s });
            localStorage.setItem('encarte_v_bg_fix', JSON.stringify(db)); renderMemoria(); alert("Salvo!");
        }

        function renderMemoria() {
            const s = document.getElementById('select-memoria'); s.innerHTML = '<option value="">Puxar da Memória...</option>';
            db.forEach((p, i) => { const o = document.createElement('option'); o.value = i; o.textContent = p.n; s.appendChild(o); });
        }

        function carregarDaMemoria() {
            const i = document.getElementById('select-memoria').value; if(i === "") return;
            const p = db[i]; document.getElementById('in-nome').value = p.n; document.getElementById('in-p1').value = p.p1;
            document.getElementById('in-l1').value = p.l1; imgT = p.i; seloT = p.s;
        }

        function exportar() {
            const el = document.getElementById('encarte');
            // ADICIONADO O BOTÃO DA ETIQUETA NA LISTA DE OCULTAR ANTES DE BAIXAR
            const btns = document.querySelectorAll('.btn-excluir, .btn-duplicar, .btn-add-selo');
            btns.forEach(b => b.style.display = 'none');
            
            html2canvas(el, { scale: 4.5, useCORS: true }).then(c => {
                const a = document.createElement('a'); a.download = 'encarte-final.png'; a.href = c.toDataURL(); a.click();
                btns.forEach(b => b.style.display = 'block'); 
            });
        }
        
        function desfazer() { 
            if(hist.length > 0) { 
                document.getElementById('grid-produtos').innerHTML = hist.pop(); 
                atualizarGradeAutomatica(); 
            } 
        }
    </script>
</body>
</html>
