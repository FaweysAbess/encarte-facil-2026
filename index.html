<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encarte PRO - Precisão Numérica e Pesos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Fredoka+One&family=Luckiest+Guy&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Passion+One:wght@400;700;900&family=Poppins:wght@400;700;900&family=Righteous&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --cor-fundo-prod: rgba(255, 255, 255, 1);
            --cor-borda-prod: rgba(255, 204, 0, 1);
            --cor-texto-nome: #333333;
            --cor-texto-legenda: #ffffff;
            --cor-texto-preco: #ffffff;
            --cor-fundo-box-preco: #d90000; 
            --fonte-nome: 'Montserrat', sans-serif;
            --fonte-preco: 'Anton', sans-serif;
            --peso-nome: 900;
            --peso-preco: 400;
            --sz-nome: 14px;
            --sz-preco: 28px;
            --dist-nome: 0px;
            --dist-preco: 0px;
            --padding-topo-grid: 230px;
            --gap-produtos: 12px;
            --grid-cols: 1; --grid-rows: 1;
            --tamanho-selo: 80px; --selo-x: -10px; --selo-y: -10px; --selo-rot: -10deg;
            
            --encarte-width: 540px;
            --encarte-height: 960px;
        }

        body { font-family: 'Segoe UI', sans-serif; display: flex; gap: 20px; padding: 20px; background: #e9ecef; margin: 0; height: 100vh; overflow: hidden; }
        .painel { width: 380px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-y: auto; flex-shrink: 0; height: 95vh; }
        
        .header-controles { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-small { padding: 5px; font-size: 10px; flex: 1; margin: 0; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #ffc107; color: black; }

        h3 { margin: 15px 0 8px 0; color: #2c3e50; font-size: 11px; border-bottom: 2px solid #f0f0f0; padding-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 3px; font-weight: 700; font-size: 10px; color: #444; }
        .form-group input[type="text"], .form-group input[type="file"], .form-group select { width: 100%; padding: 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; box-sizing: border-box; }
        
        .input-duplo { display: flex; align-items: center; gap: 6px; }
        .input-duplo input[type="range"] { flex-grow: 1; margin: 0; }
        .input-duplo input[type="number"] { width: 50px; padding: 4px; font-size: 11px; text-align: center; border: 1px solid #ccc; border-radius: 4px; -moz-appearance: textfield; }
        .input-duplo input[type="color"] { width: 30px; height: 26px; padding: 0; border: none; cursor: pointer; border-radius: 4px; }

        button { color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        .btn-add { background: #007bff; }
        .btn-import { background: #6f42c1; } 
        .btn-exportar { background: #28a745; font-size: 16px; padding: 15px; margin-top: 10px; }
        .grid-dupla { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .aviso-excel { font-size: 9px; color: #666; margin-bottom: 8px; line-height: 1.2; }

        .prancheta-container { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; overflow: auto; padding: 20px; background: #ced4da; }
        
        #encarte {
            width: var(--encarte-width); height: var(--encarte-height);
            background-color: #fff; 
            background-size: 100% 100%; 
            background-position: center;
            background-repeat: no-repeat;
            position: relative; padding: var(--padding-topo-grid) 25px 50px 25px; box-sizing: border-box; 
            transition: width 0.3s, height 0.3s; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #grid-produtos { 
            display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); grid-template-rows: repeat(var(--grid-rows), 1fr);
            gap: var(--gap-produtos); width: 100%; height: 100%; align-content: center;
        }

        .produto-item {
            background: var(--cor-fundo-prod); border: 2px solid var(--cor-borda-prod);
            border-radius: 10px; padding: 5px; text-align: center; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-sizing: border-box;
            height: 100%; overflow: hidden; transition: transform 0.2s;
        }

        .produto-nome { 
            font-family: var(--fonte-nome); font-size: var(--sz-nome); font-weight: var(--peso-nome); 
            text-transform: uppercase; color: var(--cor-texto-nome); line-height: 1.1; width: 100%; 
            min-height: 24px; display: flex; align-items: center; justify-content: center; z-index: 2;
            transform: translateY(var(--dist-nome));
        }
        
        .produto-img-wrapper { 
            width: 100%; flex-grow: 1; background-size: contain; 
            background-position: center; background-repeat: no-repeat; z-index: 1; 
            cursor: pointer; transition: opacity 0.2s;
        }
        .produto-img-wrapper:hover { opacity: 0.8; }
        
        .area-precos-flex { 
            display: flex; width: 100%; justify-content: center; align-items: flex-end;
            gap: 4px; z-index: 2; padding-bottom: 2px;
            transform: translateY(var(--dist-preco));
        }

        .bloco-preco { 
            display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: var(--cor-fundo-box-preco); border-radius: 6px; 
            padding: 2px 6px; box-shadow: 0 3px 6px rgba(0,0,0,0.15); 
            min-width: 40%; max-width: 48%;
        }

        .label-variacao { font-size: 7px; font-weight: 900; text-transform: uppercase; color: var(--cor-texto-legenda); margin-bottom: -2px; }
        .label-variacao:empty { display: none; }
        
        .produto-preco { font-family: var(--fonte-preco); font-weight: var(--peso-preco); font-size: var(--sz-preco); color: var(--cor-texto-preco); display: inline-flex; align-items: baseline; line-height: 1.1; }
        .simbolo-moeda { font-size: 0.45em; margin-right: 1px; }

        .btn-excluir { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; z-index: 20; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .btn-add-selo { position: absolute; top: -5px; right: 18px; background: #ffc107; color: black; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; z-index: 20; font-size: 10px; display: flex; align-items: center; justify-content: center;}
        .btn-duplicar { position: absolute; top: -5px; left: -5px; background: #28a745; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; z-index: 20; font-size: 10px; display: flex; align-items: center; justify-content: center;}
        
        .controles-zoom { position: absolute; bottom: 35px; left: 5px; display: flex; flex-direction: column; gap: 3px; z-index: 20; }
        .btn-z { background: rgba(0,0,0,0.3); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .btn-z:hover { background: rgba(0,0,0,0.8); }

        .produto-selo-img { position: absolute; top: var(--selo-y); left: var(--selo-x); width: var(--tamanho-selo); transform: rotate(var(--selo-rot)); z-index: 10; cursor: pointer; transition: opacity 0.2s; }
        .produto-selo-img:hover { opacity: 0.4; }
        
        .rodape-encarte { position: absolute; bottom: 12px; left: 0; width: 100%; text-align: center; color: white; font-size: 11px; font-weight: bold; cursor: text; outline: none; font-family: 'Montserrat', sans-serif; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <input type="file" id="input-trocar-img" accept="image/*" style="display: none;" onchange="efetivarTrocaImagem(this)">
    <input type="file" id="input-trocar-selo" accept="image/*" style="display: none;" onchange="efetivarTrocaSelo(this)">

    <div class="painel">
        <div class="header-controles">
            <button class="btn-warning btn-small" onclick="desfazer()">↩ Desfazer</button>
            <button class="btn-danger btn-small" onclick="limparTudo()">🗑️ Limpar Tudo</button>
        </div>

        <h3>2. Layout Global</h3>
        <div class="form-group">
            <label>Formato do Encarte:</label>
            <select id="adj-formato" onchange="mudarFormato()">
                <option value="story">Story (9:16)</option>
                <option value="feed">Feed Quadrado (1:1)</option>
                <option value="feed-retrato">Feed Retrato (4:5)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Padding Top (Altura do Cabeçalho):</label>
            <div class="input-duplo">
                <input type="range" id="range-padding-top" min="50" max="500" value="230" oninput="syncVal('num-padding-top', this.value)">
                <input type="number" id="num-padding-top" min="50" max="500" value="230" oninput="syncVal('range-padding-top', this.value)">
            </div>
        </div>
        
        <div class="form-group">
            <label>Espaço entre os Cards (Gap):</label>
            <div class="input-duplo">
                <input type="range" id="range-gap" min="0" max="50" value="12" oninput="syncVal('num-gap', this.value)">
                <input type="number" id="num-gap" min="0" max="50" value="12" oninput="syncVal('range-gap', this.value)">
            </div>
        </div>
        
        <div class="form-group"><label>Fundo do Encarte:</label><input type="file" id="in-bg-file" accept="image/*" onchange="trocarFundo(this)"></div>

        <h3>3. Importar do Excel</h3>
        <div class="aviso-excel">Colunas: A(Nome), B(Preço1), C(Leg1), D(Preço2), E(Leg2).</div>
        <input type="file" id="in-excel" accept=".xlsx, .xls, .csv" style="margin-bottom: 5px; font-size: 10px;">
        <button class="btn-import" onclick="importarPlanilha()">📥 Importar Produtos</button>

        <h3>4. Adicionar Manual</h3>
        <input type="text" id="in-nome" placeholder="Nome do Produto" style="width:100%; padding:7px; margin-bottom:5px;">
        <div class="grid-dupla">
            <input type="text" id="in-p1" placeholder="Preço 1">
            <input type="text" id="in-l1" placeholder="Leg. 1 (Ex: un)">
        </div>
        <div class="grid-dupla" style="margin-top:5px">
            <input type="text" id="in-p2" placeholder="Preço 2 (Opcional)">
            <input type="text" id="in-l2" placeholder="Leg. 2">
        </div>
        <div class="grid-dupla" style="margin-top:10px">
            <div class="form-group"><label>Foto:</label><input type="file" id="in-img" accept="image/*"></div>
            <div class="form-group"><label>Selo:</label><input type="file" id="in-selo" accept="image/*"></div>
        </div>
        <button class="btn-add" onclick="criarProduto()">+ Adicionar ao Encarte</button>

        <h3>5. Ajustes do Selo</h3>
        <div class="grid-dupla">
            <div class="form-group">
                <label>Tamanho:</label>
                <div class="input-duplo"><input type="range" id="s-size" min="30" max="250" value="80" oninput="syncVal('num-s-size', this.value)"><input type="number" id="num-s-size" value="80" oninput="syncVal('s-size', this.value)"></div>
            </div>
            <div class="form-group">
                <label>Rotação:</label>
                <div class="input-duplo"><input type="range" id="s-rot" min="-180" max="180" value="-10" oninput="syncVal('num-s-rot', this.value)"><input type="number" id="num-s-rot" value="-10" oninput="syncVal('s-rot', this.value)"></div>
            </div>
        </div>
        <div class="grid-dupla">
            <div class="form-group">
                <label>Posição X:</label>
                <div class="input-duplo"><input type="range" id="s-x" min="-100" max="200" value="-10" oninput="syncVal('num-s-x', this.value)"><input type="number" id="num-s-x" value="-10" oninput="syncVal('s-x', this.value)"></div>
            </div>
            <div class="form-group">
                <label>Posição Y:</label>
                <div class="input-duplo"><input type="range" id="s-y" min="-100" max="200" value="-10" oninput="syncVal('num-s-y', this.value)"><input type="number" id="num-s-y" value="-10" oninput="syncVal('s-y', this.value)"></div>
            </div>
        </div>

        <h3>6. Cores e Transparência</h3>
        <div class="grid-dupla">
            <div class="form-group"><label>Cor Nome:</label><input type="color" id="clr-nome" value="#333333" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Cor Legenda:</label><input type="color" id="clr-leg" value="#ffffff" oninput="aplicarDesign()"></div>
        </div>
        <div class="grid-dupla">
            <div class="form-group"><label>Cor Preço:</label><input type="color" id="clr-preco" value="#ffffff" oninput="aplicarDesign()"></div>
            <div class="form-group"><label>Cor Box Preço:</label><input type="color" id="clr-box" value="#d90000" oninput="aplicarDesign()"></div>
        </div>
        
        <div class="form-group">
            <label>Fundo do Card (Cor e Opacidade):</label>
            <div class="input-duplo">
                <input type="color" id="clr-card" value="#ffffff" oninput="aplicarDesign()">
                <input type="range" id="op-card" min="0" max="1" step="0.1" value="1" oninput="syncVal('num-op-card', this.value)">
                <input type="number" id="num-op-card" min="0" max="1" step="0.1" value="1" oninput="syncVal('op-card', this.value)">
            </div>
        </div>
        <div class="form-group">
            <label>Borda do Card (Cor e Opacidade):</label>
            <div class="input-duplo">
                <input type="color" id="clr-borda" value="#ffcc00" oninput="aplicarDesign()">
                <input type="range" id="op-borda" min="0" max="1" step="0.1" value="1" oninput="syncVal('num-op-borda', this.value)">
                <input type="number" id="num-op-borda" min="0" max="1" step="0.1" value="1" oninput="syncVal('op-borda', this.value)">
            </div>
        </div>

        <h3>7. Tipografia e Espaçamentos</h3>
        <div class="grid-dupla">
            <div class="form-group">
                <label>Fonte do Nome:</label>
                <select id="f-nome-tipo" onchange="aplicarDesign()">
                    <option value="'Montserrat'">Montserrat</option>
                    <option value="'Bebas Neue'">Bebas Neue</option>
                    <option value="'Fredoka One'">Fredoka One</option>
                    <option value="'Roboto'">Roboto</option>
                    <option value="'Poppins'">Poppins</option>
                </select>
            </div>
            <div class="form-group">
                <label>Peso do Nome:</label>
                <select id="f-nome-peso" onchange="aplicarDesign()">
                    <option value="400">Normal (400)</option>
                    <option value="700">Negrito (700)</option>
                    <option value="900" selected>Black (900)</option>
                </select>
            </div>
        </div>

        <div class="grid-dupla">
            <div class="form-group">
                <label>Fonte do Preço:</label>
                <select id="f-preco-tipo" onchange="aplicarDesign()">
                    <option value="'Anton'">Anton</option>
                    <option value="'Bebas Neue'">Bebas Neue</option>
                    <option value="'Montserrat'">Montserrat</option>
                    <option value="'Roboto'">Roboto</option>
                    <option value="'Passion One'">Passion One</option>
                </select>
            </div>
            <div class="form-group">
                <label>Peso do Preço:</label>
                <select id="f-preco-peso" onchange="aplicarDesign()">
                    <option value="400" selected>Normal (400)</option>
                    <option value="700">Negrito (700)</option>
                    <option value="900">Black (900)</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Tamanho do Nome:</label>
            <div class="input-duplo">
                <input type="range" id="range-sz-nome" min="10" max="35" value="14" oninput="syncVal('num-sz-nome', this.value)">
                <input type="number" id="num-sz-nome" min="10" max="35" value="14" oninput="syncVal('range-sz-nome', this.value)">
            </div>
        </div>
        
        <div class="form-group">
            <label>Tamanho do Preço:</label>
            <div class="input-duplo">
                <input type="range" id="range-sz-preco" min="15" max="65" value="28" oninput="syncVal('num-sz-preco', this.value)">
                <input type="number" id="num-sz-preco" min="15" max="65" value="28" oninput="syncVal('range-sz-preco', this.value)">
            </div>
        </div>

        <div class="form-group">
            <label>Distância Vertical do Nome (Eixo Y):</label>
            <div class="input-duplo">
                <input type="range" id="range-dist-nome" min="-50" max="50" value="0" oninput="syncVal('num-dist-nome', this.value)">
                <input type="number" id="num-dist-nome" min="-50" max="50" value="0" oninput="syncVal('range-dist-nome', this.value)">
            </div>
        </div>

        <div class="form-group">
            <label>Distância Vertical do Preço (Eixo Y):</label>
            <div class="input-duplo">
                <input type="range" id="range-dist-preco" min="-50" max="50" value="0" oninput="syncVal('num-dist-preco', this.value)">
                <input type="number" id="num-dist-preco" min="-50" max="50" value="0" oninput="syncVal('range-dist-preco', this.value)">
            </div>
        </div>

        <button class="btn-exportar" onclick="exportar()">🚀 BAIXAR PNG (ALTA QUALIDADE)</button>
    </div>

    <div class="prancheta-container">
        <div id="encarte" class="bg-area">
            <div id="grid-produtos"></div>
            <div class="rodape-encarte" contenteditable="true" spellcheck="false">OFERTAS VÁLIDAS ATÉ 00/00/2026 OU ENQUANTO DURAREM OS ESTOQUES.</div>
        </div>
    </div>

    <script>
        let hist = [], imgT = null, seloT = null;
        let divImagemAlvo = null; 
        let cardSeloAlvo = null; 

        window.onload = () => {
            new Sortable(document.getElementById('grid-produtos'), { 
                animation: 150, 
                onStart: () => salvarHist() 
            });
            aplicarDesign();
            atualizarGradeAutomatica();
        };

        const ler = (f) => new Promise(res => { if(!f) return res(null); const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); });
        const hexRgb = (h) => { let b = parseInt(h.replace('#', ''), 16); return `${(b>>16)&255}, ${(b>>8)&255}, ${b&255}`; };

        // Função para manter o Range e o Number sincronizados
        function syncVal(targetId, value) {
            document.getElementById(targetId).value = value;
            aplicarDesign();
        }

        function salvarHist() {
            hist.push(document.getElementById('grid-produtos').innerHTML);
            if(hist.length > 20) hist.shift();
        }

        function desfazer() { 
            if(hist.length > 0) { 
                document.getElementById('grid-produtos').innerHTML = hist.pop(); 
                atualizarGradeAutomatica(); 
            } else {
                alert("Nada para desfazer.");
            }
        }

        function limparTudo() {
            if(confirm("Deseja remover todos os produtos?")) {
                salvarHist();
                document.getElementById('grid-produtos').innerHTML = "";
                atualizarGradeAutomatica();
            }
        }

        function importarPlanilha() {
            const input = document.getElementById('in-excel');
            const file = input.files[0];
            if (!file) return alert("Selecione um arquivo Excel!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});

                if(rows.length <= 1) return alert("Planilha vazia!");

                salvarHist();
                const imgPadrao = 'https://via.placeholder.com/150/e9ecef/6c757d?text=FOTO';

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[0] || !row[1]) continue;

                    const div = document.createElement('div');
                    div.className = 'produto-item';
                    div.innerHTML = montarHtmlCard(row[0], row[1], row[2], row[3], row[4], imgPadrao, null);
                    document.getElementById('grid-produtos').appendChild(div);
                }
                atualizarGradeAutomatica();
                input.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function montarHtmlCard(n, p1, l1, p2, l2, img, selo) {
            return `
                <button class="btn-duplicar" onclick="duplicarProduto(this)" title="Duplicar">✚</button>
                <button class="btn-excluir" onclick="removerProduto(this)" title="Excluir">✕</button>
                <button class="btn-add-selo" onclick="prepararTrocaSelo(this)" title="Selo">🏷️</button>
                
                <div class="controles-zoom">
                    <button class="btn-z" onclick="alterarZoom(this, 0.1)" title="Aumentar">+</button>
                    <button class="btn-z" onclick="alterarZoom(this, -0.1)" title="Diminuir">-</button>
                </div>

                ${selo ? `<img src="${selo}" class="produto-selo-img" onclick="removerSelo(this)">` : ''}
                <div class="produto-nome" contenteditable="true">${n}</div>
                <div class="produto-img-wrapper" data-scale="1" style="transform: scale(1); background-image: url('${img}')" onclick="prepararTrocaImagem(this)"></div>
                <div class="area-precos-flex">
                    <div class="bloco-preco">
                        <div class="label-variacao" contenteditable="true">${l1 || ''}</div>
                        <div class="produto-preco" contenteditable="true"><span class="simbolo-moeda">R$</span>${p1}</div>
                    </div>
                    ${p2 ? `
                    <div class="bloco-preco">
                        <div class="label-variacao" contenteditable="true">${l2 || ''}</div>
                        <div class="produto-preco" contenteditable="true"><span class="simbolo-moeda">R$</span>${p2}</div>
                    </div>` : ''}
                </div>`;
        }

        function alterarZoom(btn, delta) {
            salvarHist();
            const wrapper = btn.closest('.produto-item').querySelector('.produto-img-wrapper');
            let currentScale = parseFloat(wrapper.getAttribute('data-scale')) || 1;
            
            currentScale += delta;
            if (currentScale < 0.2) currentScale = 0.2; 
            if (currentScale > 4.0) currentScale = 4.0; 
            
            wrapper.setAttribute('data-scale', currentScale.toFixed(2));
            wrapper.style.transform = `scale(${currentScale})`;
        }

        async function trocarFundo(input) {
            const file = input.files[0];
            if (file) {
                const url = await ler(file);
                document.getElementById('encarte').style.backgroundImage = `url('${url}')`;
            }
        }

        function prepararTrocaImagem(elemento) {
            divImagemAlvo = elemento;
            document.getElementById('input-trocar-img').click();
        }

        async function efetivarTrocaImagem(input) {
            if (input.files[0] && divImagemAlvo) {
                salvarHist();
                divImagemAlvo.style.backgroundImage = `url('${await ler(input.files[0])}')`;
            }
            input.value = ''; divImagemAlvo = null;
        }

        function prepararTrocaSelo(btn) {
            cardSeloAlvo = btn.parentElement;
            document.getElementById('input-trocar-selo').click();
        }

        async function efetivarTrocaSelo(input) {
            if (input.files[0] && cardSeloAlvo) {
                salvarHist();
                const url = await ler(input.files[0]);
                const antigo = cardSeloAlvo.querySelector('.produto-selo-img');
                if (antigo) antigo.remove();
                const novo = document.createElement('img');
                novo.src = url; novo.className = 'produto-selo-img';
                novo.onclick = function() { removerSelo(this); };
                cardSeloAlvo.appendChild(novo);
            }
            input.value = ''; cardSeloAlvo = null;
        }

        function atualizarGradeAutomatica() {
            const qtd = document.getElementById('grid-produtos').children.length;
            const s = document.documentElement.style;
            let c = 1, r = 1;

            if (qtd > 1) c = 2;
            if (qtd > 2) c = 3;
            if (qtd > 3) { c = 2; r = 2; }
            if (qtd > 4) { c = 3; r = 2; }
            if (qtd > 6) { c = 4; r = 2; }
            if (qtd > 8) { c = 3; r = 3; }
            if (qtd > 9) { c = 4; r = 3; }
            if (qtd > 12) { c = 4; r = Math.ceil(qtd/4); }

            s.setProperty('--grid-cols', c);
            s.setProperty('--grid-rows', r);
        }

        function duplicarProduto(btn) {
            salvarHist();
            const clone = btn.parentElement.cloneNode(true);
            document.getElementById('grid-produtos').appendChild(clone);
            atualizarGradeAutomatica();
        }

        function removerProduto(btn) {
            salvarHist();
            btn.parentElement.remove();
            atualizarGradeAutomatica();
        }

        function removerSelo(img) {
            salvarHist();
            img.remove();
        }

        function mudarFormato() {
            const f = document.getElementById('adj-formato').value;
            const s = document.documentElement.style;
            const pRange = document.getElementById('range-padding-top');
            const pNum = document.getElementById('num-padding-top');

            if (f === 'story') { 
                s.setProperty('--encarte-width', '540px'); 
                s.setProperty('--encarte-height', '960px'); 
                pRange.value = 230; pNum.value = 230;
            }
            else if (f === 'feed') { 
                s.setProperty('--encarte-width', '540px'); 
                s.setProperty('--encarte-height', '540px'); 
                pRange.value = 100; pNum.value = 100;
            }
            else { 
                s.setProperty('--encarte-width', '540px'); 
                s.setProperty('--encarte-height', '675px'); 
                pRange.value = 150; pNum.value = 150;
            }
            aplicarDesign();
        }

        function aplicarDesign() {
            const s = document.documentElement.style;
            const getV = (id) => document.getElementById(id).value;
            
            s.setProperty('--cor-fundo-prod', `rgba(${hexRgb(getV('clr-card'))}, ${getV('op-card')})`);
            s.setProperty('--cor-borda-prod', `rgba(${hexRgb(getV('clr-borda'))}, ${getV('op-borda')})`);
            s.setProperty('--cor-texto-nome', getV('clr-nome'));
            s.setProperty('--cor-texto-legenda', getV('clr-leg'));
            s.setProperty('--cor-texto-preco', getV('clr-preco'));
            s.setProperty('--cor-fundo-box-preco', getV('clr-box'));
            
            s.setProperty('--fonte-nome', getV('f-nome-tipo'));
            s.setProperty('--peso-nome', getV('f-nome-peso'));
            s.setProperty('--fonte-preco', getV('f-preco-tipo'));
            s.setProperty('--peso-preco', getV('f-preco-peso'));
            
            s.setProperty('--sz-nome', getV('range-sz-nome') + 'px');
            s.setProperty('--sz-preco', getV('range-sz-preco') + 'px');
            s.setProperty('--dist-nome', getV('range-dist-nome') + 'px');
            s.setProperty('--dist-preco', getV('range-dist-preco') + 'px');
            s.setProperty('--padding-topo-grid', getV('range-padding-top') + 'px');
            s.setProperty('--gap-produtos', getV('range-gap') + 'px');
            s.setProperty('--tamanho-selo', getV('s-size') + 'px');
            s.setProperty('--selo-x', getV('s-x') + 'px');
            s.setProperty('--selo-y', getV('s-y') + 'px');
            s.setProperty('--selo-rot', getV('s-rot') + 'deg');
        }

        async function criarProduto() {
            const n = document.getElementById('in-nome').value;
            const p1 = document.getElementById('in-p1').value;
            if(!n || !p1) return alert("Nome e Preço obrigatórios!");

            salvarHist();
            const uI = document.getElementById('in-img').files[0] ? await ler(document.getElementById('in-img').files[0]) : 'https://via.placeholder.com/150';
            const uS = document.getElementById('in-selo').files[0] ? await ler(document.getElementById('in-selo').files[0]) : null;

            const div = document.createElement('div');
            div.className = 'produto-item';
            div.innerHTML = montarHtmlCard(n, p1, document.getElementById('in-l1').value, document.getElementById('in-p2').value, document.getElementById('in-l2').value, uI, uS);
            document.getElementById('grid-produtos').appendChild(div);

            ["in-nome", "in-p1", "in-p2", "in-l1", "in-l2", "in-img", "in-selo"].forEach(id => document.getElementById(id).value = "");
            atualizarGradeAutomatica();
        }

        function exportar() {
            const el = document.getElementById('encarte');
            const btns = document.querySelectorAll('.btn-excluir, .btn-duplicar, .btn-add-selo, .controles-zoom');
            
            btns.forEach(b => b.style.opacity = '0');
            
            const configAltaQualidade = {
                scale: 4.5,
                useCORS: true, 
                allowTaint: true,
                backgroundColor: null,
                logging: false
            };

            html2canvas(el, configAltaQualidade).then(canvas => {
                btns.forEach(b => b.style.opacity = '1'); 
                
                const imgData = canvas.toDataURL('image/png', 1.0);
                
                const a = document.createElement('a'); 
                a.download = 'encarte-alta-resolucao.png'; 
                a.href = imgData; 
                a.click();
            });
        }
    </script>
</body>
</html>
